              <span class="title">AI 코딩 도구 & CLI vs GUI</span>
              <span class="desc">CLI 툴 철학, AI 코딩 어시스턴트 소개</span>
            </a>
            <a class="card" href="supplement-ai-harnessing-tools.html">
              <span class="badge">Supplement</span>
              <span class="title">AI Harnessing — OMO / OMX / OMC</span>
              <span class="desc">OpenCode(OMO), OpenCodeX(OMX), OpenCodeCanvas(OMC) 상세 가이드</span>
            </a>
            <a class="card" href="supplement-lux-guide.html">
              <span class="badge">Supplement</span>
              <span class="title">LUX — LLM-Powered Unix X</span>
              <span class="desc">LUX 에이전트 프레임워크 상세 가이드</span>
