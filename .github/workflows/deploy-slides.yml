name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - '.github/workflows/deploy-slides.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Convert slides to HTML
        run: |
          mkdir -p slides/html
          for f in slides/*.md; do
            name=$(basename "$f" .md)
            echo "Converting: $name"
            npx @marp-team/marp-cli "$f" --html -o "slides/html/${name}.html"
          done

      - name: Generate index page
        run: |
          cat > slides/html/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="ko">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Unity Indie School — 강의 슬라이드</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 2rem;
            }
            h1 {
              text-align: center; font-size: 2rem; margin-bottom: 0.5rem;
              background: linear-gradient(135deg, #58a6ff, #bc8cff);
              -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            }
            .subtitle { text-align: center; color: #8b949e; margin-bottom: 2rem; font-size: 0.95rem; }
            .section-title {
              font-size: 1.1rem; color: #58a6ff; margin: 2rem 0 0.75rem;
              padding-bottom: 0.3rem; border-bottom: 1px solid #21262d;
            }
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
            .card {
              background: #161b22; border: 1px solid #30363d; border-radius: 8px;
              padding: 1rem 1.25rem; text-decoration: none; color: #e6edf3;
              transition: border-color 0.2s, transform 0.15s;
              display: flex; flex-direction: column; gap: 0.3rem;
            }
            .card:hover { border-color: #58a6ff; transform: translateY(-2px); }
            .card .title { font-weight: 600; font-size: 1rem; }
            .card .desc { font-size: 0.82rem; color: #8b949e; }
            .badge {
              display: inline-block; font-size: 0.7rem; padding: 2px 8px;
              border-radius: 12px; background: #1f6feb33; color: #58a6ff; width: fit-content;
            }
            footer { text-align: center; margin-top: 3rem; color: #484f58; font-size: 0.8rem; }
          </style>
          </head>
          <body>
          <h1>🎮 Unity Indie School</h1>
          <p class="subtitle">Metroidvania Course — Slide Deck Index</p>

          <div class="section-title">📌 코스 개요</div>
